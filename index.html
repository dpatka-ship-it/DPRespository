<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danny Patka</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #6d28d9 100%);
      color: #fff;
      padding: 2rem;
    }
    main {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.125rem;
      opacity: 0.9;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world</h1>
    <p>This is my first page, deployed with GitHub and Vercel.</p>
    <span class="tag">Shipped 2026</span>
  </main>
</body>
</html>
